<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      color: #ccc;
    }

    .status {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    .status .highlight {
      font-weight: 700;
    }

    .status .x-color { color: #4fc3f7; }
    .status .o-color { color: #ef9a9a; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 6px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #1a1a1a;
      border: none;
      border-radius: 8px;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
    }

    .cell:hover:not(.taken) {
      background: #252525;
      transform: scale(1.03);
    }

    .cell.x {
      color: #4fc3f7;
    }

    .cell.o {
      color: #ef9a9a;
    }

    .cell.win {
      background: #2a2a2a;
      box-shadow: 0 0 0 2px currentColor;
    }

    .cell.taken {
      cursor: default;
    }

    .controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }

    button.btn {
      padding: 0.6rem 1.6rem;
      border: 1px solid #333;
      background: transparent;
      color: #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    button.btn:hover {
      background: #222;
      border-color: #555;
      color: #fff;
    }

    .score {
      margin-top: 2rem;
      display: flex;
      gap: 3rem;
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .score-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .score-item span:last-child {
      font-size: 1.4rem;
      font-weight: 700;
      color: #888;
    }

    .score-item.x-score span:last-child { color: #4fc3f7; }
    .score-item.o-score span:last-child { color: #ef9a9a; }

    .mode-toggle {
      margin-bottom: 1.5rem;
      display: flex;
      gap: 0;
      border: 1px solid #333;
      border-radius: 6px;
      overflow: hidden;
    }

    .mode-toggle button {
      padding: 0.45rem 1.2rem;
      border: none;
      background: transparent;
      color: #555;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .mode-toggle button.active {
      background: #222;
      color: #ccc;
    }

    .mode-toggle button:hover:not(.active) {
      background: #1a1a1a;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div class="mode-toggle">
    <button id="mode-human" class="active">vs Human</button>
    <button id="mode-bot">vs Bot</button>
  </div>
  <div class="status" id="status"></div>
  <div class="board" id="board"></div>
  <div class="controls">
    <button class="btn" id="restart">Restart</button>
    <button class="btn" id="reset-score">Reset Score</button>
  </div>
  <div class="score">
    <div class="score-item x-score">
      <span id="x-label">X Wins</span>
      <span id="x-score">0</span>
    </div>
    <div class="score-item">
      <span>Draws</span>
      <span id="draw-score">0</span>
    </div>
    <div class="score-item o-score">
      <span id="o-label">O Wins</span>
      <span id="o-score">0</span>
    </div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, score, botMode;

    function init() {
      botMode = false;
      score = { X: 0, O: 0, D: 0 };
      newGame();
    }

    function newGame() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      render();
      setStatus();
    }

    function setStatus(winner) {
      const el = document.getElementById('status');
      if (winner === 'draw') {
        el.innerHTML = "It's a <span class='highlight'>draw</span>!";
      } else if (winner) {
        const cls = winner === 'X' ? 'x-color' : 'o-color';
        const label = botMode ? (winner === 'X' ? 'You win' : 'Bot wins') : `${winner} wins`;
        el.innerHTML = `<span class="highlight ${cls}">${label}</span>!`;
      } else {
        const cls = current === 'X' ? 'x-color' : 'o-color';
        const label = botMode ? (current === 'X' ? 'Your turn' : 'Bot thinking…') : `${current}'s turn`;
        el.innerHTML = `<span class="highlight ${cls}">${label}</span>`;
      }
    }

    function checkWinner(b = board) {
      for (const [a,bc,c] of WINS) {
        if (b[a] && b[a] === b[bc] && b[a] === b[c]) {
          return { winner: b[a], line: [a,bc,c] };
        }
      }
      if (b.every(Boolean)) return { winner: 'draw', line: [] };
      return null;
    }

    // Minimax algorithm
    function minimax(b, isMaximizing) {
      const result = checkWinner(b);
      if (result) {
        if (result.winner === 'O') return 10;
        if (result.winner === 'X') return -10;
        return 0;
      }
      if (isMaximizing) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, false));
            b[i] = null;
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, true));
            b[i] = null;
          }
        }
        return best;
      }
    }

    function botMove() {
      let bestScore = -Infinity, bestIdx = -1;
      const b = [...board];
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = 'O';
          const score = minimax(b, false);
          b[i] = null;
          if (score > bestScore) { bestScore = score; bestIdx = i; }
        }
      }
      return bestIdx;
    }

    function resolveMove() {
      const result = checkWinner();
      if (result) {
        gameOver = true;
        render(result.line);
        if (result.winner === 'draw') { score.D++; setStatus('draw'); }
        else { score[result.winner]++; setStatus(result.winner); }
        updateScore();
        return true;
      }
      return false;
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (botMode && current === 'O') return; // block clicks during bot's turn
      board[i] = current;
      if (resolveMove()) return;
      current = current === 'X' ? 'O' : 'X';
      render();
      setStatus();
      if (botMode && current === 'O' && !gameOver) {
        setTimeout(() => {
          const idx = botMove();
          board[idx] = 'O';
          if (resolveMove()) return;
          current = 'X';
          render();
          setStatus();
        }, 300);
      }
    }

    function render(winLine = []) {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (val) {
          cell.classList.add(val.toLowerCase(), 'taken');
          cell.textContent = val;
        }
        if (winLine.includes(i)) cell.classList.add('win');
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function updateScore() {
      document.getElementById('x-score').textContent = score.X;
      document.getElementById('o-score').textContent = score.O;
      document.getElementById('draw-score').textContent = score.D;
    }

    function setMode(isBot) {
      botMode = isBot;
      document.getElementById('mode-human').classList.toggle('active', !isBot);
      document.getElementById('mode-bot').classList.toggle('active', isBot);
      document.getElementById('x-label').textContent = isBot ? 'Your Wins' : 'X Wins';
      document.getElementById('o-label').textContent = isBot ? 'Bot Wins' : 'O Wins';
      score = { X: 0, O: 0, D: 0 };
      updateScore();
      newGame();
    }

    document.getElementById('mode-human').addEventListener('click', () => setMode(false));
    document.getElementById('mode-bot').addEventListener('click', () => setMode(true));
    document.getElementById('restart').addEventListener('click', newGame);
    document.getElementById('reset-score').addEventListener('click', () => {
      score = { X: 0, O: 0, D: 0 };
      updateScore();
      newGame();
    });

    init();
  </script>
</body>
</html>
